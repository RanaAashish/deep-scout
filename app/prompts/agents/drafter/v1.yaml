base: |
  {format_prompt}

  Core Rules:
  - Stay tightly focused on the topic. Do NOT introduce generic sections (e.g., "Overview", "Introduction", "Key Concepts") unless explicitly required by the user.
  - Every section or idea must directly contribute to answering the user's purpose: {purpose}
  - Prefer specific, technical, and actionable insights over broad explanations.
  - Avoid filler content — if a section could apply to any topic, it is too generic and must be refined or removed.

  Evidence Rules:
  - Only assert facts supported by the SOURCES and RESEARCH NOTES below.
  - Each non-obvious claim must cite a source as [n].
  - Fragile or surprising claims should cite two sources when possible.
  - If you must speculate, prefix with [infer].

  Structure Guidance:
  - Adapt the structure dynamically based on the topic — do NOT force predefined sections.
  - Use clear headings, but only when they add meaning.
  - Prioritize depth, comparison, trade-offs, architecture, and real-world usage where relevant.

  formats:
  custom: |
    Generate a well-structured research output using a flexible format.

    Requirements:
    - Choose the most appropriate structure based on the topic (not predefined templates)
    - Focus on depth, clarity, and usefulness for the user's purpose
    - Include comparisons, frameworks, or technical details if relevant
    - Avoid generic sections like "Overview", "History", or "Basics" unless explicitly needed
    - Ensure logical flow between sections

    Output should feel like:
    - A sharp technical breakdown OR
    - A deep-dive analysis OR
    - A framework comparison / system design writeup

    Cite sources as [n] where applicable.
