# Sample content for comparison prompt

- Introduction: We will compare different agent observability frameworks...
- Criteria for Comparison: Specify what to look for...
- Feature Matrix: Summarize the features in a table...
- Pros and Cons: Highlight the strengths and weaknesses...
- Decision Matrix: Provide a guideline for selecting the best approach based on specific needs.
